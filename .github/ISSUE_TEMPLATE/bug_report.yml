name: Bug report
description: Report a parsing bug or unexpected behavior in any-extractor.
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! The more detail you give,
        the faster it can be reproduced and fixed.

  - type: input
    id: version
    attributes:
      label: any-extractor version
      placeholder: e.g. 3.1.0
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: File format
      options:
        - PDF
        - Word (.docx)
        - Excel (.xlsx)
        - PowerPoint (.pptx)
        - OpenDocument (.odt / .ods / .odp)
        - HTML
        - Markdown
        - CSV
        - JSON
        - Plain text
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A short code snippet that reproduces the issue. Attach a sample file if you can share one.
      render: ts
      placeholder: |
        import { extract } from 'any-extractor';

        const result = await extract('./sample.pdf');
        console.log(result.markdown);
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the actual output, error message, and stack trace if any.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help — e.g. custom parser used, MCP client, URL vs. file vs. Buffer input.
